name = "extensoworld"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npx tsx scripts/bundle-game-data.ts && npm run build"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "extensoworld"
database_id = "00000000-0000-0000-0000-000000000000"  # Placeholder; local dev uses --local, production needs real ID
migrations_dir = "migrations"
