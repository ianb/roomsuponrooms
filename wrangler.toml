name = "rooms-upon-rooms"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npx tsx scripts/bundle-game-data.ts && npm run build"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "rooms-upon-rooms"
database_id = "b06e1aff-a6db-4e34-9391-ac4b129f7959"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "rooms-upon-rooms-images"
